<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.2/css/all.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"/>
    <title>{{ title }} | WildRoutes</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-modern">
    <div class="container">
        <a class="navbar-brand" href="/">Wild<span>Routes</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/">Туры</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">О нас</a></li>
                <li class="nav-item"><a class="nav-link text-accent" href="/ai-chat"><i class="fas fa-robot me-1"></i>AI Чат</a></li>
                <li class="nav-item"><a class="nav-link" href="/map"><i class="fas fa-map-marked-alt me-1"></i>Карта</a></li>
            </ul>

            <div class="d-flex align-items-center">
                {% if current_user.is_authenticated %}
                    <a href="/profile" class="text-white text-decoration-none me-4 d-flex align-items-center">
                        <i class="fas fa-user-circle fa-xl me-2"></i>
                        <span>{{ current_user.name }}</span>
                    </a>

                    {% if current_user.role == 'guide' %}
                        <a href="/create_tour" class="text-white text-decoration-none me-4">
                            <i class="fas fa-plus me-1 text-accent"></i>Создать тур
                        </a>
                {% endif %}

                <a href="/logout" class="btn btn-outline-danger btn-sm px-3">Выход</a>
                {% else %}
                    <a href="/login" class="btn btn-link text-white text-decoration-none me-3">Вход</a>
                    <a href="/register" class="btn btn-accent btn-modern">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="content-wrapper">
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/slider.js') }}"></script>
</body>
</html>
