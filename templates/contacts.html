{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="contact-info-card">
                <div class="text-center mb-4">
                    <i class="fas fa-headset fa-3x text-success"></i>
                    <h3 class="mt-3">Свяжитесь с нами</h3>
                    <p class="text-muted">Мы всегда рады помочь</p>
                </div>

                <div class="contact-details">
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt text-success"></i>
                        <div>
                            <strong>Адрес</strong>
                            <p class="text-muted">г. Москва, ул. Программистов, д. 42</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <i class="fas fa-phone text-success"></i>
                        <div>
                            <strong>Телефон</strong>
                            <p class="text-muted">+7 (999) 123-45-67</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <i class="fas fa-envelope text-success"></i>
                        <div>
                            <strong>Email</strong>
                            <p class="text-muted">support@wildroutes.ru</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <i class="fas fa-clock text-success"></i>
                        <div>
                            <strong>Режим работы</strong>
                            <p class="text-muted">Пн-Пт: 10:00 - 19:00</p>
                        </div>
                    </div>
                </div>

                <div class="social-links mt-4 text-center">
                    <a href="#" class="btn btn-outline-success me-2"><i class="fab fa-telegram"></i></a>
                    <a href="#" class="btn btn-outline-success me-2"><i class="fab fa-vk"></i></a>
                    <a href="#" class="btn btn-outline-success"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="contact-form-card">
                <h4><i class="fas fa-paper-plane text-success me-2"></i>Напишите нам</h4>
                <form method="post" class="mt-4">
                    <div class="mb-3">
                        <label class="form-label">Ваше имя</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тема</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сообщение</label>
                        <textarea class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-paper-plane me-2"></i>Отправить сообщение
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
