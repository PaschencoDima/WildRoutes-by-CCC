{% extends "base.html" %}

{% block content %}
<div class="error-section">
    <div class="container text-center py-5">
        <div class="error-card">
            <i class="fas fa-map-signs fa-5x text-muted mb-4"></i>
            <h1 class="display-1 fw-bold text-muted">404</h1>
            <h2 class="mb-3">Страница не найдена</h2>
            <p class="lead text-muted mb-4">К сожалению, запрашиваемая страница не существует или была перемещена</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/index" class="btn btn-success btn-lg">
                    <i class="fas fa-home me-2"></i>На главную
                </a>
                <a href="/news" class="btn btn-outline-success btn-lg">
                    <i class="fas fa-landmark me-2"></i>К достопримечательностям
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
