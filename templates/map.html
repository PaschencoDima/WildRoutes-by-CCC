{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h3 class="mb-4">{{ title }}</h3>
    <div id="map" style="width: 100%; height: 500px; border-radius: 10px; border: 1px solid #555;"></div>
    <div class="mt-3">
        <p><strong>Текущее местоположение:</strong> Проспект Героев, Санкт-Петербург, ГБОУ школа №509</p>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey={{ api_key }}&lang=ru_RU" type="text/javascript"></script>
<script type="text/javascript">
    ymaps.ready(init);
    function init() {
        var myMap = new ymaps.Map("map", {
            center: {{ coords }},
            zoom: 16,
            controls: ['zoomControl', 'typeSelector', 'fullscreenControl']
        });

        var myPlacemark = new ymaps.Placemark({{ coords }}, {
            balloonContentHeader: "Школа №509",
            balloonContentBody: "Самая новая школа на Проспекте Героев",
            balloonContentFooter: "Санкт-Петербург"
        }, {
            preset: 'islands#greenEducationIcon'
        });

        myMap.geoObjects.add(myPlacemark);
    }
</script>
{% endblock %}
