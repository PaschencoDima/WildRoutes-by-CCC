{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="ai-chat-card booking-card p-4"> <div class="chat-header mb-4">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-robot fa-2x text-accent me-3"></i>
                        <div>
                            <h3 class="mb-0">AI-помощник WildRoutes</h3>
                            <p class="text-muted small mb-0">Задай вопрос о путешествиях, турах или достопримечательностях</p>
                        </div>
                        <button class="btn btn-sm btn-outline-modern ms-auto" onclick="clearChat()">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="chat-messages modern-slider flex-column" id="chatMessages" style="height: 450px; overflow-y: auto; display: flex;">
                    </div>

                <div class="chat-input-area mt-4">
                    <div class="input-group shadow-sm">
                        <input type="text" id="userMessage" class="form-control bg-dark text-white border-secondary"
                               placeholder="Спроси меня о путешествиях..." autocomplete="off"
                               onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button class="btn btn-accent" id="sendBtn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane me-2"></i>Отправить
                        </button>
                    </div>

                    <div class="suggestions mt-3">
                        <small class="text-muted d-block mb-2">Примеры вопросов:</small>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-modern" onclick="setMessage('Какие туры есть на Байкал?')">🏞️ Туры на Байкал</button>
                            <button class="btn btn-sm btn-outline-modern" onclick="setMessage('Что посмотреть в Санкт-Петербурге?')">🏛️ Питер</button>
                            <button class="btn btn-sm btn-outline-modern" onclick="setMessage('Как забронировать тур?')">📝 Бронь</button>
                            <button class="btn btn-sm btn-outline-modern" onclick="setMessage('Советы для похода в горы')">🏔️ Поход</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
